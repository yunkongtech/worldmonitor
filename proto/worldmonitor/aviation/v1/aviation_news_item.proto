syntax = "proto3";

package worldmonitor.aviation.v1;

import "sebuf/http/annotations.proto";

// AviationNewsItem represents a single aviation news article or press release.
message AviationNewsItem {
  // Unique item identifier (hash of URL).
  string id = 1;
  // Article title.
  string title = 2;
  // Article URL.
  string url = 3;
  // Name of the news source (e.g., "FlightGlobal").
  string source_name = 4;
  // Publication time as Unix epoch milliseconds.
  int64 published_at = 5 [(sebuf.http.int64_encoding) = INT64_ENCODING_NUMBER];
  // Short text snippet or description.
  string snippet = 6;
  // Entities matched from the query (airport codes, airline names).
  repeated string matched_entities = 7;
  // Article image URL (if available).
  string image_url = 8;
}
