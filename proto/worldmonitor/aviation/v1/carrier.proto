syntax = "proto3";

package worldmonitor.aviation.v1;

// Carrier represents an airline or aircraft operator.
message Carrier {
  // IATA two-letter airline code (e.g., "TK").
  string iata_code = 1;
  // ICAO three-letter airline code (e.g., "THY").
  string icao_code = 2;
  // Full airline name (e.g., "Turkish Airlines").
  string name = 3;
}
