name: Scheduled Upstream Sync

on:
  schedule:
    - cron: '0 0 * * *' # 每天北京时间早上8点
  workflow_dispatch:   # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync Upstream
        uses: bridge-core/github-action-sync@v1
        with:
          upstream_repository: koala73/worldmonitor
          upstream_branch: main
          target_branch: main
          # 这一步会自动处理冲突，如果失败会报错提醒
